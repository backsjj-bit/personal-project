<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메뉴 | 두루두루 디저트 카페</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="./list.css" />
    <script src="../js/data.js" defer></script>
    <script src="../js/utils.js" defer></script>
    <script src="../js/cart-sidebar.js" defer></script>
    <script src="./list.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div>
        <img class="brand-logo" src="../images/logo/duruduru-badge.png" alt="두루두루 디저트 카페 로고" />
        <div class="brand-text">
        <a class="brand-link" href="../index.html">두루두루</a>
        <h1>메뉴</h1>
        </div>
      </div>
      <nav class="top-nav" aria-label="고객 메뉴">
        <a href="../index.html">홈</a>
        <a aria-current="page" href="./list.html">메뉴</a>
        <a href="../basket/list.html">장바구니</a>
        <a href="../orders/list.html">주문내역</a>
        <a href="../my/index.html">마이페이지</a>
      </nav>
    </header>

    <main class="container page-with-sidebar">
      <div class="menu-page">
        <section class="menu-toolbar glass-card" aria-label="메뉴 검색 및 필터">
          <label>
            <span>검색</span>
            <input id="searchInput" type="search" placeholder="메뉴명, 설명 검색" />
          </label>
          <label>
            <span>카테고리</span>
            <select id="categoryFilter"></select>
          </label>
        </section>

        <section class="menu-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Cafe Menu</p>
              <h2>오늘의 메뉴</h2>
            </div>
            <span id="menuCount" class="count-badge">0개</span>
          </div>
          <div id="menuGrid" class="menu-grid" aria-live="polite"></div>
        </section>
      </div>

      <aside class="cart-sidebar glass-card" id="cartSidebar">
        <div class="cart-sidebar__header">
          <h3>장바구니</h3>
          <span id="cartSidebarCount" class="count-badge">0개</span>
        </div>
        <div id="cartSidebarList" class="cart-sidebar__list"></div>
        <p id="cartSidebarEmpty" class="cart-sidebar__empty">담긴 메뉴가 없습니다.</p>
        <div class="cart-sidebar__total">
          <span>합계</span>
          <span id="cartSidebarTotal"></span>
        </div>
        <a class="primary-button cart-sidebar__checkout" id="cartSidebarCheckout" href="../basket/list.html">바로 결제하기</a>
      </aside>
    </main>
  </body>
</html>
