<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주문 내역 | 두루두루 디저트 카페</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="./list.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <img class="brand-logo" src="../images/logo/duruduru-badge.png" alt="두루두루 디저트 카페 로고" />
        <div class="brand-text">
        <a class="brand-link" href="../index.html">두루두루</a>
        <h1>주문 내역</h1>
        </div>
      </div>
      <nav class="top-nav" aria-label="고객 메뉴">
        <a href="../index.html">홈</a>
        <a href="../menus/list.html">메뉴</a>
        <a href="../basket/list.html">장바구니</a>
        <a aria-current="page" href="./list.html">주문내역</a>
        <a href="../my/index.html">마이페이지</a>
      </nav>
    </header>

    <main class="container page">
      <section class="page-heading">
        <span id="order-count" class="count-badge">0건</span>
      </section>

      <section class="summary-grid" aria-label="주문 요약">
        <article class="summary-card glass-card">
          <span>전체 주문</span>
          <strong id="total-orders">0건</strong>
        </article>
        <article class="summary-card glass-card">
          <span>진행 중</span>
          <strong id="active-orders">0건</strong>
        </article>
        <article class="summary-card glass-card">
          <span>누적 금액</span>
          <strong id="total-price">₩0</strong>
        </article>
      </section>

      <div id="order-list" class="order-list" aria-live="polite"></div>

      <section id="empty-state" class="empty-state glass-card" hidden>
        <h2>아직 주문 내역이 없습니다.</h2>
        <p>장바구니에서 주문을 완료하면 이곳에서 내역을 확인할 수 있습니다.</p>
        <a class="btn btn-primary" href="../menus/list.html">메뉴 보러가기</a>
      </section>
    </main>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="./list.js"></script>
  </body>
</html>
