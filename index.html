<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>두루두루 디저트 카페</title>
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./index.css" />
    <script src="./js/data.js" defer></script>
    <script src="./js/utils.js" defer></script>
    <script src="./index.js" defer></script>
  </head>
  <body>
    <aside class="side-banner" aria-hidden="true">
      <p class="side-banner__eyebrow">NEW</p>
      <img src="./images/menu/levain-cookie.jpg" alt="르뱅쿠키" />
      <p class="side-banner__title">LEVAIN COOKIES</p>
      <p class="side-banner__flavors">오리지널 · 말차 · 초코</p>
      <p class="side-banner__desc">회원가입시<br />르뱅쿠키 쿠폰 증정!</p>
      <a class="side-banner__cta" href="./auth/signup.html">회원가입하기</a>
    </aside>

    <header class="site-header">
      <div>
        <img class="brand-logo" src="./images/logo/duruduru-badge.png" alt="두루두루 디저트 카페 로고" />
        <div class="brand-text">
        <a class="brand-link" href="./index.html">두루두루</a>
        </div>
      </div>
      <nav class="top-nav" aria-label="고객 메뉴">
        <a aria-current="page" href="./index.html">홈</a>
        <a href="./menus/list.html">메뉴</a>
        <a href="./basket/list.html">장바구니</a>
        <a href="./orders/list.html">주문내역</a>
        <a href="./my/index.html">마이페이지</a>
      </nav>
    </header>

    <main class="container home-page">
      <section class="hero-carousel">
        <div class="hero-carousel__track" id="heroTrack">
          <div class="hero-slide hero glass-card">
            <div class="hero-text">
              <p class="eyebrow">Duru Duru 🍋</p>
              <h2>새콤달콤한 하루, 두루두루 디저트 카페</h2>
              <p class="hero-copy">향긋한 레몬 디저트와 함께 잠시 쉬어가는 시간을 두루두루에서 채워보세요.</p>
              <a class="primary-button" href="./menus/list.html">메뉴 보러가기</a>
            </div>
            <div class="hero-media">
              <img src="./images/logo/duruduru-wordmark.png" alt="두루두루 디저트 카페" />
            </div>
          </div>
          <div class="hero-slide stamp-card glass-card" id="stampCard"></div>
        </div>
        <button class="hero-carousel__arrow hero-carousel__arrow--prev" id="heroPrev" type="button" aria-label="이전 슬라이드">‹</button>
        <button class="hero-carousel__arrow hero-carousel__arrow--next" id="heroNext" type="button" aria-label="다음 슬라이드">›</button>
        <div class="hero-carousel__dots" id="heroDots">
          <button class="hero-carousel__dot is-active" type="button" data-slide="0" aria-label="1번째 슬라이드"></button>
          <button class="hero-carousel__dot" type="button" data-slide="1" aria-label="2번째 슬라이드"></button>
        </div>
      </section>

      <section class="menu-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Recommended</p>
            <h2>추천 메뉴</h2>
          </div>
          <a class="ghost-button" href="./menus/list.html">전체 메뉴 보기</a>
        </div>
        <div id="recommendedGrid" class="menu-grid" aria-live="polite"></div>
      </section>

      <section class="category-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Category</p>
            <h2>카테고리</h2>
          </div>
        </div>
        <div id="categoryList" class="category-list"></div>
      </section>
    </main>

    <footer class="site-footer">
      <a class="admin-link" href="./admin/login.html">관리자</a>
    </footer>
  </body>
</html>
