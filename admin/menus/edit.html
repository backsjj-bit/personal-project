<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메뉴 수정 - 카페 관리자</title>
    <link rel="stylesheet" href="/css/variables.css" />
    <link rel="stylesheet" href="/admin/menus/edit.css" />
  </head>
  <body>
    <header class="admin-header">
      <div class="container admin-header__inner">
        <div class="admin-header__brand-group">
        <img class="brand-logo brand-logo--admin" src="/images/logo/duruduru-badge.png" alt="두루두루 디저트 카페 로고" />
        <a class="admin-header__brand" href="/admin/index.html">두루두루 관리자</a>
        </div>
        <nav class="admin-nav">
          <a href="/admin/index.html">대시보드</a>
          <a href="/admin/menus/list.html" class="is-active">메뉴 관리</a>
          <a href="/admin/orders/list.html">주문 관리</a>
          <a href="/index.html" class="admin-nav__exit">고객 페이지로 나가기</a>
        </nav>
      </div>
    </header>

    <main class="container admin-main">
      <a class="back-link" href="/admin/menus/list.html">← 메뉴 목록으로</a>
      <h1>메뉴 수정</h1>

      <form id="menu-form" class="menu-form glass-card" hidden>
        <label class="menu-form__field">
          <span>메뉴명 *</span>
          <input type="text" name="name" required />
        </label>

        <label class="menu-form__field">
          <span>영문명</span>
          <input type="text" name="englishName" />
        </label>

        <label class="menu-form__field">
          <span>카테고리 *</span>
          <select name="categoryId" id="category-select" required></select>
        </label>

        <label class="menu-form__field">
          <span>이미지 URL</span>
          <input type="url" name="image" />
        </label>

        <label class="menu-form__field">
          <span>설명</span>
          <textarea name="description" rows="3"></textarea>
        </label>

        <label class="menu-form__field">
          <span>태그 (쉼표로 구분)</span>
          <input type="text" name="tags" />
        </label>

        <fieldset class="menu-form__fieldset">
          <legend>온도 옵션</legend>
          <label><input type="checkbox" name="temperature" value="hot" /> HOT</label>
          <label><input type="checkbox" name="temperature" value="iced" /> ICED</label>
          <label><input type="checkbox" name="temperature" value="room" /> 상온</label>
        </fieldset>

        <fieldset class="menu-form__fieldset menu-form__fieldset--column">
          <legend>사이즈 &amp; 가격 (원) *</legend>
          <label class="menu-form__size-price">
            <span><input type="checkbox" name="sizes" value="regular" /> Regular</span>
            <input type="number" name="price_regular" min="0" step="100" placeholder="가격" />
          </label>
          <label class="menu-form__size-price">
            <span><input type="checkbox" name="sizes" value="large" /> Large</span>
            <input type="number" name="price_large" min="0" step="100" placeholder="가격" />
          </label>
          <label class="menu-form__size-price">
            <span><input type="checkbox" name="sizes" value="single" /> Single</span>
            <input type="number" name="price_single" min="0" step="100" placeholder="가격" />
          </label>
        </fieldset>

        <div class="menu-form__row">
          <label class="menu-form__checkbox">
            <input type="checkbox" name="isRecommended" /> 추천 메뉴로 등록
          </label>
          <label class="menu-form__checkbox">
            <input type="checkbox" name="isSoldOut" /> 품절 처리
          </label>
        </div>

        <div class="menu-form__actions">
          <a class="btn btn--ghost" href="/admin/menus/list.html">취소</a>
          <button type="submit" class="btn btn--primary">저장</button>
        </div>
      </form>

      <p id="not-found-message" class="empty-state" hidden>메뉴를 찾을 수 없습니다.</p>
    </main>

    <script src="/js/data.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/admin/menus/edit.js"></script>
      <script src="/js/scroll-top.js" defer></script>
  </body>
</html>
